<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SocialMate — Save to Drafts</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 360px;
      background: #030712;
      color: #f9fafb;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      padding: 16px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      padding-bottom: 12px;
      border-bottom: 1px solid #1f2937;
    }

    .logo-mark {
      width: 28px;
      height: 28px;
      background: #f59e0b;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 900;
      color: #000;
      flex-shrink: 0;
    }

    .logo-text {
      font-size: 15px;
      font-weight: 700;
      color: #f9fafb;
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      color: #6b7280;
      margin-top: 1px;
    }

    /* Source URL */
    .source-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 10px;
      background: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 8px;
      padding: 7px 10px;
    }

    .source-icon {
      font-size: 11px;
      flex-shrink: 0;
      color: #6b7280;
    }

    .source-url {
      font-size: 11px;
      color: #9ca3af;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    /* Textarea */
    .label {
      font-size: 11px;
      font-weight: 600;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }

    textarea {
      width: 100%;
      height: 100px;
      background: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 8px;
      color: #f9fafb;
      font-size: 13px;
      font-family: inherit;
      line-height: 1.5;
      padding: 10px;
      resize: vertical;
      outline: none;
      transition: border-color 0.15s;
    }

    textarea:focus {
      border-color: #f59e0b;
    }

    textarea::placeholder {
      color: #4b5563;
    }

    .char-count {
      font-size: 11px;
      color: #4b5563;
      text-align: right;
      margin-top: 4px;
      margin-bottom: 12px;
    }

    /* Platforms */
    .platforms-label {
      font-size: 11px;
      font-weight: 600;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    .platforms-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-bottom: 14px;
    }

    .platform-item {
      display: flex;
      align-items: center;
      gap: 7px;
      background: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 7px;
      padding: 7px 10px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }

    .platform-item:hover {
      border-color: #374151;
    }

    .platform-item input[type="checkbox"] {
      width: 14px;
      height: 14px;
      accent-color: #f59e0b;
      cursor: pointer;
      flex-shrink: 0;
    }

    .platform-item label {
      font-size: 12px;
      color: #d1d5db;
      cursor: pointer;
      white-space: nowrap;
    }

    .platform-item.checked {
      border-color: #92400e;
      background: #1c1206;
    }

    /* Save button */
    #saveBtn {
      width: 100%;
      background: #f59e0b;
      color: #000;
      border: none;
      border-radius: 9px;
      padding: 11px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      letter-spacing: -0.2px;
    }

    #saveBtn:hover {
      background: #fbbf24;
    }

    #saveBtn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Status */
    #status {
      margin-top: 10px;
      font-size: 13px;
      text-align: center;
      min-height: 20px;
      display: none;
      border-radius: 7px;
      padding: 8px 12px;
    }

    #status.success {
      display: block;
      background: #052e16;
      border: 1px solid #166534;
      color: #4ade80;
    }

    #status.error {
      display: block;
      background: #1f0a0a;
      border: 1px solid #991b1b;
      color: #f87171;
    }

    /* Footer */
    .footer {
      margin-top: 12px;
      text-align: center;
    }

    .footer a {
      font-size: 11px;
      color: #4b5563;
      text-decoration: none;
    }

    .footer a:hover {
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="logo-mark">S</div>
    <div>
      <div class="logo-text">SocialMate</div>
      <div class="logo-sub">Save to Drafts</div>
    </div>
  </div>

  <!-- Source URL -->
  <div class="source-row">
    <span class="source-icon">🔗</span>
    <span class="source-url" id="sourceUrl">Loading page info...</span>
  </div>

  <!-- Content textarea -->
  <div class="label">Content</div>
  <textarea
    id="content"
    placeholder="Selected text will appear here, or type your post..."
    maxlength="5000"
  ></textarea>
  <div class="char-count"><span id="charCount">0</span> / 5000</div>

  <!-- Platform selector -->
  <div class="platforms-label">Platforms</div>
  <div class="platforms-grid">
    <div class="platform-item checked" data-platform="bluesky">
      <input type="checkbox" id="bluesky" name="platforms" value="bluesky" checked />
      <label for="bluesky">Bluesky</label>
    </div>
    <div class="platform-item checked" data-platform="discord">
      <input type="checkbox" id="discord" name="platforms" value="discord" checked />
      <label for="discord">Discord</label>
    </div>
    <div class="platform-item checked" data-platform="telegram">
      <input type="checkbox" id="telegram" name="platforms" value="telegram" checked />
      <label for="telegram">Telegram</label>
    </div>
    <div class="platform-item checked" data-platform="mastodon">
      <input type="checkbox" id="mastodon" name="platforms" value="mastodon" checked />
      <label for="mastodon">Mastodon</label>
    </div>
    <div class="platform-item checked" data-platform="twitter">
      <input type="checkbox" id="twitter" name="platforms" value="twitter" checked />
      <label for="twitter">X / Twitter</label>
    </div>
    <div class="platform-item checked" data-platform="tiktok">
      <input type="checkbox" id="tiktok" name="platforms" value="tiktok" checked />
      <label for="tiktok">TikTok</label>
    </div>
    <div class="platform-item checked" data-platform="linkedin">
      <input type="checkbox" id="linkedin" name="platforms" value="linkedin" checked />
      <label for="linkedin">LinkedIn</label>
    </div>
  </div>

  <!-- Save button -->
  <button id="saveBtn">Save to Drafts</button>

  <!-- Status message -->
  <div id="status"></div>

  <!-- Footer -->
  <div class="footer">
    <a href="https://socialmate.studio" target="_blank">socialmate.studio</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
